<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SecureMessage Studio</title>
  <link rel="stylesheet" href="assets/css/styles.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>

<body>
  <canvas id="matrixCanvas"></canvas>
  
  <div class="container">
    <section class="card">

      <h2>🔐 SecureMessage Studio</h2>

      <!-- 🔹 CIFRADO -->
      <h3>Cifrado / Descifrado</h3>

      <textarea id="messageInput" placeholder="Escribe tu mensaje..."></textarea>

      <div class="key-container">
        <input type="password" id="keyInput" placeholder="Clave secreta">
        <button id="toggleKeyBtn" onclick="toggleKey()">👁</button>
      </div>

      <div class="buttons">
        <button onclick="encryptMessage()">Cifrar</button>
        <button onclick="decryptMessage()">Descifrar</button>
      </div>

      <textarea id="resultOutput" placeholder="Resultado..." readonly></textarea>

      <button onclick="copyResult()">📋 Copiar resultado</button>

      <hr style="margin:20px 0; border-color:#00ff9f;">

      <!-- 🔹 ESTEGANOGRAFÍA -->
      <h3>Ocultar mensaje en imagen</h3>

      <div id="dropZone" class="drop-zone">
        Arrastra tu imagen aquí o haz click
      </div>

      <input type="file" id="imageInput" accept="image/*">

      <button onclick="clearImage()">Quitar imagen</button>

      <textarea id="secretMessage" placeholder="Mensaje secreto..."></textarea>

      <div class="key-container">
        <input type="password" id="imageKey" placeholder="Clave secreta para la imagen">
        <button id="toggleImageKeyBtn" onclick="toggleImageKey()">👁</button>
      </div>

      <div class="buttons">
        <button onclick="hideMessage()">Ocultar mensaje</button>
        <button onclick="extractMessage()">Extraer mensaje</button>
        <button onclick="downloadImage()">Descargar imagen</button>
      </div>

      <div id="status" class="status"></div>

      <img id="outputImage" style="max-width:100%; display:none;">

    </section>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
